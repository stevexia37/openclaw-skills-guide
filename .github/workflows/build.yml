name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --name qa_tool_linux --distpath dist scripts/qa_cli.py
          mkdir -p dist/knowledge
          cp knowledge/faq.jsonl dist/knowledge/
          cp knowledge/topics.json dist/knowledge/

      - name: Build executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile --name qa_tool_macos --distpath dist scripts/qa_cli.py
          mkdir -p dist/knowledge
          cp knowledge/faq.jsonl dist/knowledge/
          cp knowledge/topics.json dist/knowledge/

      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --name qa_tool_windows.exe --distpath dist scripts/qa_cli.py
          mkdir dist\knowledge
          copy knowledge\faq.jsonl dist\knowledge\
          copy knowledge\topics.json dist\knowledge\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: build-ubuntu-latest
          path: linux/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: build-macos-latest
          path: macos/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: build-windows-latest
          path: windows/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            linux/qa_tool_linux
            linux/knowledge/*
            macos/qa_tool_macos
            macos/knowledge/*
            windows/qa_tool_windows.exe
            windows/knowledge/*
          body: |
            ## 🦞 OpenClaw 问答工具
            
            下载适合你系统的文件：
            
            | 系统 | 文件 | 大小 |
            |------|------|------|
            | Windows | qa_tool_windows.exe | ~10MB |
            | macOS | qa_tool_macos | ~10MB |
            | Linux | qa_tool_linux | ~10MB |
            
            ### 使用方法
            
            1. 下载可执行文件 + knowledge 目录
            2. 运行程序
            3. 输入问题获取答案
            
            ### 功能
            
            📚 24+ 常见问题知识库  
            🔍 智能搜索匹配  
            📂 主题分类浏览  
            💬 交互式问答
            
            ---
            
            [查看完整教程](https://github.com/stevexia37/openclaw-skills-guide)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}